<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelt Vocabulary</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="spelt-popup">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo-row">
        <span class="logo-text">Spelt</span>
        <button id="open-dash-btn" class="dashboard-launch-btn" title="Open Dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          <span>Dashboard</span>
        </button>
      </div>
      <p class="subtitle">SRS Vocabulary practice</p>
    </header>

    <!-- Content stats -->
    <main class="popup-main">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Due Reviews</div>
          <div id="due-count" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Words</div>
          <div id="total-count" class="stat-value">0</div>
        </div>
      </div>

      <!-- Spellcheck Sandbox -->
      <div class="quick-add-section">
        <h3>Spellcheck Sandbox</h3>
        <form id="quick-add-form">
          <div class="input-wrapper">
            <input type="text" id="word-input" class="premium-input" placeholder="Type word & press Enter to verify..." autocomplete="off" required style="text-align: center; font-size: 0.9rem; font-weight: 600;">
          </div>
        </form>
        <div id="feedback-msg" class="feedback-text" style="display: none; padding: 10px; border-radius: var(--radius-xl); background: hsla(155, 10%, 15%, 0.5); border: 1px solid var(--border); margin-top: 10px; line-height: 1.35; text-align: left; box-sizing: border-box;"></div>
      </div>
    </main>

    <!-- Mini Footer -->
    <footer class="popup-footer">
      <div class="session-info" style="display: flex; align-items: center; gap: 6px; width: 100%;">
        <span class="user-status-dot active"></span>
        <span class="user-label">Local Profile</span>
      </div>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
