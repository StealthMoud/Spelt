<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelt Vocabulary</title>
  <link rel="stylesheet" href="popup.css">
  <script>
    if (typeof chrome === 'undefined' || !chrome.runtime) {
      window.chrome = {
        runtime: {
          onMessage: { addListener: () => {} },
          sendMessage: () => {},
          getURL: (path) => path
        },
        storage: {
          local: {
            get: (keys, cb) => {
              const res = {};
              const keysArr = Array.isArray(keys) ? keys : [keys];
              keysArr.forEach(k => {
                try {
                  res[k] = JSON.parse(localStorage.getItem(k));
                } catch (_) {
                  res[k] = localStorage.getItem(k);
                }
              });
              if (cb) cb(res);
            },
            set: (obj, cb) => {
              Object.keys(obj).forEach(k => {
                localStorage.setItem(k, JSON.stringify(obj[k]));
              });
              if (cb) cb();
            }
          },
          onChanged: { addListener: () => {} }
        },
        windows: {
          getCurrent: (cb) => { if (cb) cb({}); },
          update: () => {},
          create: () => {}
        }
      };
    }
  </script>
</head>
<body>
  <div class="spelt-popup">
<!-- INCLUDE header.html -->
<!-- INCLUDE offline.html -->
    <!-- Main Content Panes -->
    <main class="popup-main">
<!-- INCLUDE sandbox.html -->
<!-- INCLUDE practice.html -->
<!-- INCLUDE vault.html -->
<!-- INCLUDE stats.html -->
<!-- INCLUDE settings.html -->
    </main>
<!-- INCLUDE modals.html -->
  </div>

  <div class="resizer resizer-l"></div>
  <div class="resizer resizer-r"></div>
  <div class="resizer resizer-b"></div>
  <div class="resizer resizer-t"></div>
  <div class="resizer resizer-tl"></div>
  <div class="resizer resizer-tr"></div>
  <div class="resizer resizer-bl"></div>
  <div class="resizer resizer-br"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
