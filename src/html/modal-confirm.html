    <!-- MODAL: Custom Confirm Dialog -->
    <div id="popup-confirm-modal" class="modal-overlay">
      <div class="modal-card" style="max-width: 280px; text-align: center;">
        <h3 id="popup-confirm-title" style="margin-top: 0; color: var(--danger); font-size: 0.95rem;">Confirm Action</h3>
        <p id="popup-confirm-msg" style="font-size: 0.76rem; color: var(--text-muted); margin: 8px 0 16px; line-height: 1.4;"></p>
        <div id="popup-confirm-input-container" style="display: none; margin-bottom: 12px; text-align: left; user-select: none; -webkit-user-select: none;">
          <label id="popup-confirm-input-label" style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 3px; font-weight: 600; text-align: center; user-select: none; -webkit-user-select: none;"></label>
          <input type="text" id="popup-confirm-input" class="premium-input" placeholder="Confirm text..." autocomplete="off" style="text-align: center; font-size: 0.75rem; padding: 5px; box-sizing: border-box; width: 100%; user-select: text; -webkit-user-select: text;">
        </div>
        <div class="modal-actions-row" style="justify-content: center; gap: 8px;">
          <button type="button" id="popup-confirm-cancel-btn" class="submit-btn" style="padding: 6px 12px; font-size: 0.75rem;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 10px; height: 10px; margin-right: 2px;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            <span>Cancel</span>
          </button>
          <button type="button" id="popup-confirm-ok-btn" class="submit-btn primary-save-btn" style="padding: 6px 12px; font-size: 0.75rem;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 10px; height: 10px; margin-right: 2px;"><polyline points="20 6 9 17 4 12"/></svg>
            <span>OK</span>
          </button>
        </div>
      </div>
    </div>
