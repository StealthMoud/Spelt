    <!-- Header -->
    <header class="popup-header">
      <div class="logo-row">
        <div style="display: flex; align-items: center; gap: 8px;">
          <span class="logo-text">Spelt</span>
          <div class="session-info">
            <span class="user-status-dot active"></span>
            <span class="user-label">Local Profile</span>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 6px;">
          <!-- Font Resizer Controls -->
          <div class="font-resizer-controls" style="display: flex; align-items: center; gap: 2px; background: hsla(155, 10%, 15%, 0.4); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1px 3px;">
            <button id="font-decrease-btn" class="table-icon-btn" title="Decrease text size" style="font-size: 0.65rem; font-weight: bold; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; padding: 0; color: var(--text-muted); cursor: pointer; border: none; background: none; border-radius: 2px;">A-</button>
            <span id="font-scale-display" style="font-size: 0.62rem; color: var(--text-muted); min-width: 26px; text-align: center; font-weight: 600; user-select: none;">100%</span>
            <button id="font-increase-btn" class="table-icon-btn" title="Increase text size" style="font-size: 0.75rem; font-weight: bold; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; padding: 0; color: var(--text-muted); cursor: pointer; border: none; background: none; border-radius: 2px;">A+</button>
          </div>
          <button id="popup-refresh-btn" class="table-icon-btn" title="Refresh data">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>
      
      <!-- Tab Navigation -->
      <nav class="popup-tabs">
        <button class="tab-btn active" data-tab="sandbox-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Sandbox</span>
        </button>
        <button class="tab-btn" data-tab="practice-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>Practice</span>
          <span id="popup-due-badge" class="due-badge" style="display: none;">0</span>
        </button>
        <button class="tab-btn" data-tab="vault-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
          <span>Vault</span>
        </button>
        <button class="tab-btn" data-tab="stats-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>Stats</span>
        </button>
        <button class="tab-btn" data-tab="settings-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Settings</span>
        </button>
      </nav>
    </header>
