          <!-- Back Face -->
          <div class="card-face card-back">
            <button class="practice-edit-btn table-icon-btn" title="Edit Word" style="position: absolute; top: 8px; right: 8px; z-index: 10;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
            </button>
            <div class="back-header-row" style="padding-right: 18px;">
              <div style="display: flex; align-items: center; width: 100%; justify-content: space-between;">
                <h3 id="back-word-display" style="margin: 0;"></h3>
                <div id="spelling-result-badge" class="result-badge success">Correct</div>
              </div>
              <span id="back-transcription-display" style="font-size: 0.72rem; color: var(--text-muted);"></span>
              <div id="back-audio-container"></div>
            </div>
            <div class="back-details-list">
              <p><strong>You typed:</strong> <span id="user-typed-display"></span></p>
              <p><strong>Definition:</strong> <span id="back-definition-display"></span></p>
              <p><strong>Part of Speech:</strong> <span id="back-part-of-speech-display" style="text-transform: capitalize; font-style: italic;"></span></p>
              <p id="back-level-row" style="display: none;"><strong>Level:</strong> <span id="back-level-display" style="font-weight: 700; color: #f59e0b;"></span></p>
              <div id="back-example-container" style="display: none;">
                <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                  <p style="margin: 0;"><strong>Example:</strong></p>
                  <div style="display: flex; gap: 4px;">
                    <button type="button" id="back-play-example-btn" class="play-example-btn" title="Pronounce Example">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                    <button type="button" id="back-translate-btn" class="translate-example-btn" title="Translate Example">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
                    </button>
                  </div>
                </div>
                <p id="back-example-display" style="font-style: italic; color: var(--primary-light); margin-top: 4px;"></p>
                <p id="back-example-translation-container" style="display: none; margin-top: 2px;">
                  <strong>Translation:</strong> <span id="back-example-translation-display"></span>
                </p>
              </div>
              <div id="past-misspellings-container" style="display: none;">
                <p><strong>Past errors:</strong> <span id="back-misspellings-display" style="color: var(--danger); font-weight: 500;"></span></p>
              </div>
            </div>
            
            <!-- SRS Buttons -->
            <div class="srs-rating-wrapper">
              <button class="srs-btn srs-again" data-score="1">
                <kbd class="srs-kbd">1</kbd>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 11px; height: 11px; margin-bottom: 2px;"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                <span>Again</span>
                <small class="srs-hint">Incorrect</small>
              </button>
              <button class="srs-btn srs-hard" data-score="3">
                <kbd class="srs-kbd">2</kbd>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 11px; height: 11px; margin-bottom: 2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>Hard</span>
                <small class="srs-hint">1d</small>
              </button>
              <button class="srs-btn srs-good" data-score="4">
                <kbd class="srs-kbd">3</kbd>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 11px; height: 11px; margin-bottom: 2px;"><polyline points="20 6 9 17 4 12"/></svg>
                <span>Good</span>
                <small class="srs-hint">6d</small>
              </button>
              <button class="srs-btn srs-easy" data-score="5">
                <kbd class="srs-kbd">4</kbd>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 11px; height: 11px; margin-bottom: 2px;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                <span>Easy</span>
                <small class="srs-hint">12d</small>
              </button>
              <button class="srs-btn srs-mastered" data-score="mastered">
                <kbd class="srs-kbd">5</kbd>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 11px; height: 11px; margin-bottom: 2px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span>Mastered</span>
                <small class="srs-hint">Archive</small>
              </button>
            </div>
          </div>
